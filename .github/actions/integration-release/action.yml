name: Integration Release
description: Build + publish integration images and marketplace metadata.

inputs:
  image_name:
    description: Image name without registry/owner (e.g. homenavi-spotify).
    required: true
  registry:
    description: Container registry hostname.
    required: false
    default: ghcr.io
  dockerfile:
    description: Path to Dockerfile.
    required: false
    default: ./Dockerfile
  context:
    description: Build context path.
    required: false
    default: .
  platforms:
    description: Build platforms.
    required: false
    default: linux/amd64,linux/arm64
  ghcr_username:
    description: Registry username.
    required: true
  ghcr_token:
    description: Registry token.
    required: true
  manifest_path:
    description: Path to homenavi integration manifest.
    required: false
    default: manifest/homenavi-integration.json
  metadata_path:
    description: Path to marketplace metadata JSON.
    required: false
    default: marketplace/metadata.json
  marketplace_api_url:
    description: Marketplace API base URL.
    required: true
  oidc_audience:
    description: OIDC audience for the marketplace.
    required: false
    default: homenavi-marketplace

runs:
  using: composite
  steps:
    - name: Compute registry owner
      id: owner
      shell: bash
      run: echo "owner_lower=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: ./go.mod

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: "20"

    - name: Install Helm
      shell: bash
      run: |
        set -euo pipefail
        curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

    - name: Central verify gate
      uses: PetoAdam/homenavi/.github/actions/integration-verify@main
      with:
        manifest_path: ${{ inputs.manifest_path }}

    - name: Central go vet
      shell: bash
      run: go vet ./...

    - name: Install gosec
      shell: bash
      run: |
        set -euo pipefail
        go install github.com/securego/gosec/v2/cmd/gosec@v2.22.0

    - name: Central gosec
      shell: bash
      run: |
        set -euo pipefail
        "$(go env GOPATH)/bin/gosec" ./...

    - name: Check marketplace uniqueness
      shell: bash
      env:
        MARKETPLACE_API_URL: ${{ inputs.marketplace_api_url }}
        METADATA_PATH: ${{ inputs.metadata_path }}
      run: |
        set -euo pipefail
        node "${GITHUB_ACTION_PATH}/scripts/check-uniqueness.js"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.ghcr_username }}
        password: ${{ inputs.ghcr_token }}

    - name: Log in Helm registry
      shell: bash
      run: |
        set -euo pipefail
        echo "${{ inputs.ghcr_token }}" | helm registry login "${{ inputs.registry }}" --username "${{ inputs.ghcr_username }}" --password-stdin

    - name: Install Kompose
      shell: bash
      run: |
        set -euo pipefail
        KOMPOSE_VERSION=v1.35.0
        curl -fsSL -o /usr/local/bin/kompose "https://github.com/kubernetes/kompose/releases/download/${KOMPOSE_VERSION}/kompose-linux-amd64"
        chmod +x /usr/local/bin/kompose
        kompose version

    - name: Build and push
      id: build_push
      uses: docker/build-push-action@v5
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: true
        platforms: ${{ inputs.platforms }}
        provenance: true
        sbom: true
        tags: |
          ${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${{ inputs.image_name }}:${{ github.ref_name }}
          ${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${{ inputs.image_name }}:latest

    - name: Export Docker image archive
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${{ inputs.image_name }}:${{ github.ref_name }}
      run: |
        set -euo pipefail
        docker pull "$IMAGE_REF"
        docker save "$IMAGE_REF" -o /tmp/integration-release-image.tar

    - name: Scan image with Trivy
      shell: bash
      run: |
        set -euo pipefail
        docker run --rm \
          -v /tmp:/tmp \
          aquasec/trivy:0.69.3 image \
          --input /tmp/integration-release-image.tar \
          --format table \
          --exit-code 1 \
          --ignore-unfixed \
          --pkg-types os,library \
          --scanners vuln \
          --severity CRITICAL,HIGH

    - name: Install Cosign
      uses: sigstore/cosign-installer@v3.8.1

    - name: Sign image digest (keyless)
      shell: bash
      env:
        IMAGE_REF: ${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${{ inputs.image_name }}
        IMAGE_DIGEST: ${{ steps.build_push.outputs.digest }}
      run: |
        set -euo pipefail
        if [[ -z "${IMAGE_DIGEST:-}" ]]; then
          echo "Missing image digest from build step" >&2
          exit 1
        fi
        cosign sign --yes "${IMAGE_REF}@${IMAGE_DIGEST}"

    - name: Publish native Helm chart
      shell: bash
      env:
        TAG: ${{ github.ref_name }}
        METADATA_PATH: ${{ inputs.metadata_path }}
        CHART_REGISTRY: oci://${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}
      run: |
        set -euo pipefail

        NATIVE_HELM_CHART_REF=$(METADATA_PATH="$METADATA_PATH" node - <<'NODE'
        const fs = require('fs');
        const metadata = JSON.parse(fs.readFileSync(process.env.METADATA_PATH, 'utf8'));
        const chartRef = metadata?.deployment_artifacts?.helm?.chart_ref || '';
        process.stdout.write(String(chartRef).trim());
        NODE
        )
        if [[ -z "$NATIVE_HELM_CHART_REF" ]]; then
          echo "No native Helm chart declared; skipping native Helm publish."
          exit 0
        fi

        mapfile -t CHART_FILES < <(find . \( -path './.git' -o -path './node_modules' \) -prune -o -name Chart.yaml -print)
        if [[ ${#CHART_FILES[@]} -eq 0 ]]; then
          echo "Native Helm chart declared ($NATIVE_HELM_CHART_REF) but no Chart.yaml was found in the repository." >&2
          exit 1
        fi
        if [[ ${#CHART_FILES[@]} -gt 1 ]]; then
          printf 'Multiple Chart.yaml files found for native Helm publish:\n' >&2
          printf ' - %s\n' "${CHART_FILES[@]}" >&2
          exit 1
        fi

        CHART_VERSION="${TAG#v}"
        EXPECTED_NAME="${NATIVE_HELM_CHART_REF##*/}"
        SOURCE_CHART_DIR=$(dirname "${CHART_FILES[0]}")
        WORK_CHART_DIR=/tmp/native-helm-chart
        PACKAGE_DIR=/tmp/native-helm-chart-package
        rm -rf "$WORK_CHART_DIR" "$PACKAGE_DIR"
        mkdir -p "$WORK_CHART_DIR" "$PACKAGE_DIR"
        cp -R "$SOURCE_CHART_DIR"/. "$WORK_CHART_DIR"/

        ACTUAL_NAME=$(awk -F': *' '$1 == "name" {gsub(/\"/, "", $2); print $2; exit}' "$WORK_CHART_DIR/Chart.yaml")
        if [[ "$ACTUAL_NAME" != "$EXPECTED_NAME" ]]; then
          echo "Native Helm chart name mismatch: metadata expects $EXPECTED_NAME but chart name is $ACTUAL_NAME" >&2
          exit 1
        fi

        perl -0pi -e 's/^version:\s*.*/version: '"$CHART_VERSION"'/m; if ($_ !~ /^appVersion:/m) { $_ .= qq{appVersion: "'"$CHART_VERSION"'"\n}; } else { s/^appVersion:\s*.*/appVersion: "'"$CHART_VERSION"'"/m; }' "$WORK_CHART_DIR/Chart.yaml"

        helm lint "$WORK_CHART_DIR"
        helm package "$WORK_CHART_DIR" -d "$PACKAGE_DIR"

        PACKAGE_FILE=$(find "$PACKAGE_DIR" -maxdepth 1 -name "*.tgz" -print | head -n 1)
        if [[ -z "$PACKAGE_FILE" ]]; then
          echo "Native Helm chart package not found" >&2
          exit 1
        fi

        helm push "$PACKAGE_FILE" "$CHART_REGISTRY"

        PUBLIC_PULL_DIR=/tmp/native-helm-chart-public-check
        PUBLIC_HELM_CONFIG=/tmp/native-helm-chart-public-helm-registry.json
        rm -rf "$PUBLIC_PULL_DIR"
        mkdir -p "$PUBLIC_PULL_DIR"
        printf '{}' > "$PUBLIC_HELM_CONFIG"

        if ! HELM_REGISTRY_CONFIG="$PUBLIC_HELM_CONFIG" helm pull "$NATIVE_HELM_CHART_REF" --version "$CHART_VERSION" -d "$PUBLIC_PULL_DIR" >/tmp/native-helm-chart-public-check.log 2>&1; then
          cat /tmp/native-helm-chart-public-check.log >&2 || true
          echo "Native Helm chart $NATIVE_HELM_CHART_REF:$CHART_VERSION is not anonymously pullable after publish." >&2
          exit 1
        fi

    - name: Generate and push Kubernetes generated chart
      id: generate_k8s
      shell: bash
      env:
        TAG: ${{ github.ref_name }}
        IMAGE_NAME: ${{ inputs.image_name }}
        IMAGE_REF: ${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${{ inputs.image_name }}:${{ github.ref_name }}
        METADATA_PATH: ${{ inputs.metadata_path }}
        MANIFEST_PATH: ${{ inputs.manifest_path }}
        OUTPUT_DIR: /tmp/generated-k8s-chart
        CHART_REGISTRY: oci://${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}
      run: |
        set -euo pipefail

        NATIVE_HELM_CHART_REF=$(METADATA_PATH="$METADATA_PATH" node - <<'NODE'
        const fs = require('fs');
        const metadata = JSON.parse(fs.readFileSync(process.env.METADATA_PATH, 'utf8'));
        const chartRef = metadata?.deployment_artifacts?.helm?.chart_ref || '';
        process.stdout.write(String(chartRef).trim());
        NODE
        )
        if [[ -n "$NATIVE_HELM_CHART_REF" ]]; then
          echo "Native Helm chart declared ($NATIVE_HELM_CHART_REF); skipping generated Kubernetes artifact."
          echo "chart_ref=" >> "$GITHUB_OUTPUT"
          echo "version=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        COMPOSE_SOURCE=$(METADATA_PATH="$METADATA_PATH" node "${GITHUB_ACTION_PATH}/scripts/resolve-compose-artifact.js")
        if [[ -z "$COMPOSE_SOURCE" ]]; then
          echo "No compose artifact declared; skipping generated Kubernetes artifact."
          echo "chart_ref=" >> "$GITHUB_OUTPUT"
          echo "version=" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        rm -rf "$OUTPUT_DIR"
        mkdir -p "$OUTPUT_DIR" /tmp/generated-k8s-chart-package

        if kompose convert -f "$COMPOSE_SOURCE" -c -o "$OUTPUT_DIR"; then
          echo "Kompose chart generation succeeded."
        else
          echo "Kompose chart generation failed; falling back to normalized generated chart." >&2
          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"
          node "${GITHUB_ACTION_PATH}/scripts/generate-k8s-generated-chart.js"
        fi

        CHART_FILE=$(find "$OUTPUT_DIR" -name Chart.yaml -print | head -n 1)
        if [[ -z "$CHART_FILE" ]]; then
          echo "Expected Chart.yaml under $OUTPUT_DIR" >&2
          exit 1
        fi
        CHART_DIR=$(dirname "$CHART_FILE")

        CHART_VERSION="${TAG#v}"
        helm lint "$CHART_DIR"
        helm package "$CHART_DIR" -d /tmp/generated-k8s-chart-package

        PACKAGE_FILE=$(find /tmp/generated-k8s-chart-package -maxdepth 1 -name "*.tgz" -print | head -n 1)
        if [[ -z "$PACKAGE_FILE" ]]; then
          echo "Generated chart package not found" >&2
          exit 1
        fi

        GENERATED_NAME="${{ inputs.image_name }}-k8s-generated"
        GENERATED_PACKAGE="/tmp/generated-k8s-chart-package/${GENERATED_NAME}-${CHART_VERSION}.tgz"
        mv "$PACKAGE_FILE" "$GENERATED_PACKAGE"
        helm push "$GENERATED_PACKAGE" "$CHART_REGISTRY"

        PUBLIC_PULL_DIR=/tmp/generated-k8s-chart-public-check
        PUBLIC_HELM_CONFIG=/tmp/generated-k8s-chart-public-helm-registry.json
        rm -rf "$PUBLIC_PULL_DIR"
        mkdir -p "$PUBLIC_PULL_DIR"
        printf '{}' > "$PUBLIC_HELM_CONFIG"

        if HELM_REGISTRY_CONFIG="$PUBLIC_HELM_CONFIG" helm pull "oci://${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${GENERATED_NAME}" --version "$CHART_VERSION" -d "$PUBLIC_PULL_DIR" >/tmp/generated-k8s-chart-public-check.log 2>&1; then
          echo "Generated chart is anonymously pullable."
          echo "chart_ref=oci://${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${GENERATED_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
        else
          echo "::warning::Generated chart oci://${{ inputs.registry }}/${{ steps.owner.outputs.owner_lower }}/${GENERATED_NAME}:${CHART_VERSION} is not anonymously pullable after publish; omitting k8s_generated from marketplace payload. Make the GHCR package public in GitHub package settings and rerun if you want to publish the fallback chart ref."
          cat /tmp/generated-k8s-chart-public-check.log >&2 || true
          echo "chart_ref=" >> "$GITHUB_OUTPUT"
          echo "version=" >> "$GITHUB_OUTPUT"
        fi

    - name: Publish to marketplace
      shell: bash
      env:
        K8S_GENERATED_CHART_REF: ${{ steps.generate_k8s.outputs.chart_ref }}
        K8S_GENERATED_KIND: helm
        K8S_GENERATED_VERSION: ${{ steps.generate_k8s.outputs.version }}
        MARKETPLACE_API_URL: ${{ inputs.marketplace_api_url }}
        METADATA_PATH: ${{ inputs.metadata_path }}
        MANIFEST_PATH: ${{ inputs.manifest_path }}
        OIDC_AUDIENCE: ${{ inputs.oidc_audience }}
      run: |
        set -euo pipefail

        if [[ ! -f "$METADATA_PATH" ]]; then
          echo "Marketplace metadata file not found at $METADATA_PATH" >&2
          exit 1
        fi

        if [[ ! -f "$MANIFEST_PATH" ]]; then
          echo "Manifest file not found at $MANIFEST_PATH" >&2
          exit 1
        fi

        TAG="${GITHUB_REF_NAME:-}"
        if [[ -z "$TAG" ]]; then
          echo "GITHUB_REF_NAME is required (run on a tag)" >&2
          exit 1
        fi

        RAW_BASE="https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/${TAG}"
        BASE_URL="${MARKETPLACE_API_URL%/}"

        OIDC_TOKEN=$("${GITHUB_ACTION_PATH}/scripts/get-oidc-token.sh")

        # Build normalized publish payload from metadata/manifest JSON.
        PAYLOAD=$(TAG="$TAG" \
          RAW_BASE="$RAW_BASE" \
          MANIFEST_URL="$RAW_BASE/$MANIFEST_PATH" \
          METADATA_PATH="$METADATA_PATH" \
          MANIFEST_PATH="$MANIFEST_PATH" \
          node "${GITHUB_ACTION_PATH}/scripts/build-payload.js")

        curl -fsS \
          -X POST "$BASE_URL/api/integrations/publish-oidc" \
          -H "Authorization: Bearer $OIDC_TOKEN" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD"

        echo "Marketplace publish complete."

