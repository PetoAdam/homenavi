name: Release Frontend Docker Image

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    uses: ./.github/workflows/service_release.yml
    with:
      service: frontend
      context: ./frontend
      dockerfile: ./frontend/Dockerfile
      build_args: |
        HOMENAVI_APP_VERSION=${{ github.ref_name }}
        GITHUB_SHA=${{ github.sha }}
    secrets: inherit
