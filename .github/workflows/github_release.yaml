name: Create GitHub Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        description: Tag to create/update the GitHub Release for (e.g. v0.1.0-alpha.14)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
    steps:
      - name: Check if release already exists
        id: check_release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = process.env.TAG_NAME;
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Release for tag ${tag} already exists.`);
              core.setOutput('exists', 'true');
            } catch (error) {
              if (error.status === 404) {
                core.info(`No release found for tag ${tag}.`);
                core.setOutput('exists', 'false');
              } else {
                throw error;
              }
            }

      - name: Release already exists
        if: steps.check_release.outputs.exists == 'true'
        run: echo "✅ Release for ${TAG_NAME} already exists. Skipping creation."

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          generate_release_notes: true