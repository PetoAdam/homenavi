{{- range $name, $svc := .Values.services }}
{{- if eq (include "homenavi.serviceEnabled" (dict "root" $ "component" $name)) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "homenavi.componentName" (dict "root" $ "component" $name) }}
  labels:
    {{- include "homenavi.componentLabels" (dict "root" $ "component" $name) | nindent 4 }}
spec:
  replicas: {{ default 1 $svc.replicas }}
  selector:
    matchLabels:
      {{- include "homenavi.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  template:
    metadata:
      labels:
        {{- include "homenavi.selectorLabels" $ | nindent 8 }}
        app.kubernetes.io/component: {{ $name }}
      {{- $zigbee2mqttInlineConfig := trim (default "" $svc.configuration) }}
      {{- $zigbee2mqttExistingConfigMap := trim (default "" $svc.existingConfigurationConfigMap) }}
      {{- $zigbee2mqttConfigKey := default "configuration.yaml" $svc.configurationConfigMapKey }}
      {{- $zigbee2mqttHasConfigSource := and (eq $name "zigbee2mqtt") (or (ne $zigbee2mqttInlineConfig "") (ne $zigbee2mqttExistingConfigMap "")) }}
      {{- if or (eq $name "frontend") (eq $name "integration-proxy") (eq $name "emqx") $zigbee2mqttHasConfigSource (eq (include "homenavi.jwtStaticSecret" $) "true") }}
      annotations:
        {{- if eq $name "frontend" }}
        checksum/frontend-nginx-config: {{ include (print $.Template.BasePath "/frontend-nginx-config.yaml") $ | sha256sum }}
        {{- end }}
        {{- if eq $name "integration-proxy" }}
        checksum/integration-proxy-config: {{ include (print $.Template.BasePath "/integration-proxy-config.yaml") $ | sha256sum }}
        {{- end }}
        {{- if eq $name "emqx" }}
        checksum/emqx-config: {{ include (print $.Template.BasePath "/emqx-config.yaml") $ | sha256sum }}
        {{- end }}
        {{- if and (eq $name "zigbee2mqtt") (ne $zigbee2mqttInlineConfig "") }}
        checksum/zigbee2mqtt-config: {{ include (print $.Template.BasePath "/zigbee2mqtt-config.yaml") $ | sha256sum }}
        {{- end }}
        {{- if eq (include "homenavi.jwtStaticSecret" $) "true" }}
        checksum/jwt-secret: {{ include (print $.Template.BasePath "/jwt-secret.yaml") $ | sha256sum }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "homenavi.serviceAccountName" $ }}
      {{- with $svc.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- with $.Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- $svcEnv := default (dict) $svc.env }}
      {{- $svcEnvValueFrom := default (dict) $svc.envValueFrom }}
      {{- $usesMQTT := default false $svc.usesMQTT }}
      {{- $injectMQTTWebsocketUpstream := default false $svc.injectMQTTWebsocketUpstream }}
      {{- $serviceDependencies := default (list) $svc.dependsOn }}
      {{- $zigbee2mqttBootstrapEnabled := and $zigbee2mqttHasConfigSource (default true $svc.bootstrapConfiguration) }}
      {{- $zigbee2mqttOverwriteOnDeploy := and $zigbee2mqttBootstrapEnabled (default false $svc.overwriteConfigurationOnDeploy) }}
      {{- with $svc.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with $svc.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      {{- if $usesMQTT }}
      {{- $mqttDepHost := trim (include "homenavi.mqttDependencyHost" $) }}
      {{- $mqttDepPort := trim (include "homenavi.mqttDependencyPort" $) }}
      {{- if ne $mqttDepHost "" }}
      {{- $serviceDependencies = append $serviceDependencies (dict "host" $mqttDepHost "port" $mqttDepPort) }}
      {{- end }}
      {{- end }}
      {{- if and (eq (include "homenavi.redisProvider" $) "bundled") (hasKey $svcEnv "REDIS_MODE") }}
      {{- $serviceDependencies = append $serviceDependencies (dict "host" (include "homenavi.redisDependencyHost" $) "port" (include "homenavi.redisDependencyPort" $)) }}
      {{- end }}
      {{- if and (eq (len $serviceDependencies) 0) (ne $name "postgres") (hasKey $svcEnv "POSTGRES_HOST") }}
      {{- $serviceDependencies = list (dict "host" (include "homenavi.postgresHost" $) "port" (include "homenavi.postgresPort" $)) }}
      {{- end }}
      {{- $serviceDependencyKeys := dict }}
      {{- $dedupedServiceDependencies := list }}
      {{- range $dep := $serviceDependencies }}
      {{- $depHost := trim (default "" $dep.host) }}
      {{- $depPort := printf "%v" $dep.port }}
      {{- if eq $depHost "postgres" }}
      {{- $depHost = trim (include "homenavi.postgresHost" $) }}
      {{- $depPort = trim (include "homenavi.postgresPort" $) }}
      {{- else if eq $depHost "redis" }}
      {{- $depHost = trim (include "homenavi.redisDependencyHost" $) }}
      {{- $depPort = trim (include "homenavi.redisDependencyPort" $) }}
      {{- else if eq $depHost "emqx" }}
      {{- $depHost = trim (include "homenavi.mqttDependencyHost" $) }}
      {{- $depPort = trim (include "homenavi.mqttDependencyPort" $) }}
      {{- end }}
      {{- $depKey := printf "%s:%s" $depHost $depPort }}
      {{- if and (ne $depHost "") (not (hasKey $serviceDependencyKeys $depKey)) }}
      {{- $_ := set $serviceDependencyKeys $depKey true }}
      {{- $dedupedServiceDependencies = append $dedupedServiceDependencies (dict "host" $depHost "port" $depPort) }}
      {{- end }}
      {{- end }}
      {{- $extraInitContainers := default (list) $svc.initContainers }}
      {{- if or (eq $name "profile-picture-service") (eq $name "integration-proxy") $zigbee2mqttBootstrapEnabled (gt (len $dedupedServiceDependencies) 0) (gt (len $extraInitContainers) 0) }}
      initContainers:
        {{- if and (eq $name "profile-picture-service") (eq (include "homenavi.storageType" $) "s3") (eq (include "homenavi.objectStorageProvider" $) "minio") }}
        - name: ensure-profile-picture-bucket
          image: minio/mc:RELEASE.2025-02-21T16-00-46Z
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              until mc alias set local {{ include "homenavi.storageS3Endpoint" $ | quote }} "$STORAGE_S3_ACCESS_KEY" "$STORAGE_S3_SECRET_KEY"; do
                echo "waiting for object storage..."
                sleep 2
              done
              mc mb --ignore-existing local/{{ include "homenavi.storageS3Bucket" $ | quote }}
          env:
            - name: STORAGE_S3_ACCESS_KEY
              {{- if ne (trim (include "homenavi.storageS3AuthSecretName" $)) "" }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.storageS3AuthSecretName" $ }}
                  key: {{ include "homenavi.storageS3AccessKeyKey" $ }}
              {{- else }}
              value: {{ include "homenavi.storageS3AccessKey" $ | quote }}
              {{- end }}
            - name: STORAGE_S3_SECRET_KEY
              {{- if ne (trim (include "homenavi.storageS3AuthSecretName" $)) "" }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.storageS3AuthSecretName" $ }}
                  key: {{ include "homenavi.storageS3SecretKeyKey" $ }}
              {{- else }}
              value: {{ include "homenavi.storageS3SecretKey" $ | quote }}
              {{- end }}
        {{- end }}
        {{- if eq $name "integration-proxy" }}
        - name: bootstrap-integration-config
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              mkdir -p /var/lib/integration-proxy
              if [ ! -f /var/lib/integration-proxy/installed.yaml ]; then
                cp /bootstrap-config/installed.yaml /var/lib/integration-proxy/installed.yaml
              fi
          volumeMounts:
            - name: integration-state
              mountPath: /var/lib/integration-proxy
            - name: integration-config-bootstrap
              mountPath: /bootstrap-config
        {{- end }}
        {{- if $zigbee2mqttBootstrapEnabled }}
        - name: bootstrap-zigbee2mqtt-config
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              mkdir -p /app/data
              {{- if $zigbee2mqttOverwriteOnDeploy }}
              cp /bootstrap-config/{{ $zigbee2mqttConfigKey }} /app/data/configuration.yaml
              {{- else }}
              if [ ! -s /app/data/configuration.yaml ]; then
                cp /bootstrap-config/{{ $zigbee2mqttConfigKey }} /app/data/configuration.yaml
              fi
              {{- end }}
          volumeMounts:
            - name: zigbee2mqtt-data
              mountPath: /app/data
            - name: zigbee2mqtt-bootstrap-config
              mountPath: /bootstrap-config/{{ $zigbee2mqttConfigKey }}
              subPath: {{ $zigbee2mqttConfigKey }}
              readOnly: true
        {{- end }}
        {{- if gt (len $dedupedServiceDependencies) 0 }}
        - name: wait-for-dependencies
          image: busybox:1.36
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -ec
            - |
              set -e
              {{- range $dep := $dedupedServiceDependencies }}
              until nc -z {{ $dep.host | quote }} {{ printf "%v" $dep.port | quote }}; do
                echo "waiting for {{ $dep.host }}:{{ $dep.port }}..."
                sleep 2
              done
              {{- end }}
        {{- end }}
        {{- with $extraInitContainers }}
{{ toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ $name }}
          image: {{ include "homenavi.image" (dict "root" $ "service" $svc) }}
          imagePullPolicy: {{ default $.Values.global.imagePullPolicy $svc.image.pullPolicy }}
          {{- with $svc.command }}
          command:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.args }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if $svc.containerPort }}
          ports:
            - name: http
              containerPort: {{ $svc.containerPort }}
              protocol: TCP
            {{- with $svc.extraContainerPorts }}
            {{- range . }}
            - name: {{ .name }}
              containerPort: {{ .containerPort }}
              protocol: {{ default "TCP" .protocol }}
            {{- end }}
            {{- end }}
          {{- end }}
          {{- with $svc.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or $usesMQTT $injectMQTTWebsocketUpstream $svc.env $svc.envValueFrom }}
          env:
            {{- if $usesMQTT }}
            - name: MQTT_BROKER_URL
              value: {{ include "homenavi.mqttBrokerURL" $ | quote }}
            {{- end }}
            {{- if $injectMQTTWebsocketUpstream }}
            - name: MQTT_WEBSOCKET_UPSTREAM_URL
              value: {{ include "homenavi.mqttWebsocketUpstreamURL" $ | quote }}
            {{- end }}
            {{- range $envKey, $envVal := $svc.env }}
            {{- $renderedVal := printf "%v" $envVal }}
            {{- if eq $envKey "POSTGRES_HOST" }}
            {{- $renderedVal = include "homenavi.postgresHost" $ }}
            {{- else if eq $envKey "POSTGRES_PORT" }}
            {{- $renderedVal = include "homenavi.postgresPort" $ }}
            {{- else if eq $envKey "POSTGRES_DB" }}
            {{- $renderedVal = include "homenavi.postgresDatabase" $ }}
            {{- else if eq $envKey "POSTGRES_USER" }}
            {{- $renderedVal = include "homenavi.postgresUser" $ }}
            {{- else if eq $envKey "POSTGRES_PASSWORD" }}
            {{- $renderedVal = include "homenavi.postgresPassword" $ }}
            {{- else if eq $envKey "POSTGRES_SSLMODE" }}
            {{- $renderedVal = include "homenavi.postgresSSLMode" $ }}
            {{- else if eq $envKey "REDIS_MODE" }}
            {{- $renderedVal = include "homenavi.redisMode" $ }}
            {{- else if eq $envKey "REDIS_ADDR" }}
            {{- $renderedVal = include "homenavi.redisAddr" $ }}
            {{- else if eq $envKey "REDIS_MASTER_NAME" }}
            {{- $renderedVal = include "homenavi.redisMasterName" $ }}
            {{- else if eq $envKey "REDIS_SENTINEL_ADDRS" }}
            {{- $renderedVal = include "homenavi.redisSentinelAddrs" $ }}
            {{- else if eq $envKey "STORAGE_TYPE" }}
            {{- $renderedVal = include "homenavi.storageType" $ }}
            {{- else if eq $envKey "STORAGE_S3_ENDPOINT" }}
            {{- $renderedVal = include "homenavi.storageS3Endpoint" $ }}
            {{- else if eq $envKey "STORAGE_S3_REGION" }}
            {{- $renderedVal = include "homenavi.storageS3Region" $ }}
            {{- else if eq $envKey "STORAGE_S3_BUCKET" }}
            {{- $renderedVal = include "homenavi.storageS3Bucket" $ }}
            {{- else if eq $envKey "STORAGE_S3_ACCESS_KEY" }}
            {{- $renderedVal = include "homenavi.storageS3AccessKey" $ }}
            {{- else if eq $envKey "STORAGE_S3_SECRET_KEY" }}
            {{- $renderedVal = include "homenavi.storageS3SecretKey" $ }}
            {{- else if eq $envKey "STORAGE_S3_FORCE_PATH_STYLE" }}
            {{- $renderedVal = include "homenavi.storageS3ForcePathStyle" $ }}
            {{- else if eq $envKey "STORAGE_PRESIGN_EXPIRY_SECONDS" }}
            {{- $renderedVal = include "homenavi.storagePresignExpirySeconds" $ }}
            {{- else if eq $envKey "MINIO_ROOT_USER" }}
            {{- $renderedVal = include "homenavi.storageS3AccessKey" $ }}
            {{- else if eq $envKey "MINIO_ROOT_PASSWORD" }}
            {{- $renderedVal = include "homenavi.storageS3SecretKey" $ }}
            {{- end }}
            {{- if hasKey $svcEnvValueFrom $envKey }}
            {{- continue }}
            {{- end }}
            {{- if and (or (eq $envKey "POSTGRES_USER") (eq $envKey "POSTGRES_PASSWORD")) (ne (trim (include "homenavi.postgresAuthSecretName" $)) "") }}
            {{- continue }}
            {{- end }}
            {{- if and (or (eq $envKey "STORAGE_S3_ACCESS_KEY") (eq $envKey "STORAGE_S3_SECRET_KEY") (eq $envKey "MINIO_ROOT_USER") (eq $envKey "MINIO_ROOT_PASSWORD")) (ne (trim (include "homenavi.storageS3AuthSecretName" $)) "") }}
            {{- continue }}
            {{- end }}
            {{- if ne $renderedVal "" }}
            - name: {{ $envKey }}
              value: {{ $renderedVal | quote }}
            {{- end }}
            {{- end }}
            {{- if and (hasKey $svcEnv "REDIS_MODE") (not (hasKey $svcEnv "REDIS_PASSWORD")) (not (hasKey $svcEnvValueFrom "REDIS_PASSWORD")) (ne (trim (include "homenavi.redisAuthSecretName" $)) "") }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.redisAuthSecretName" $ }}
                  key: {{ include "homenavi.redisAuthPasswordKey" $ }}
            {{- end }}
            {{- if and (hasKey $svcEnv "POSTGRES_USER") (ne (trim (include "homenavi.postgresAuthSecretName" $)) "") }}
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.postgresAuthSecretName" $ }}
                  key: {{ include "homenavi.postgresAuthUsernameKey" $ }}
            {{- end }}
            {{- if and (hasKey $svcEnv "POSTGRES_PASSWORD") (ne (trim (include "homenavi.postgresAuthSecretName" $)) "") }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.postgresAuthSecretName" $ }}
                  key: {{ include "homenavi.postgresAuthPasswordKey" $ }}
            {{- end }}
            {{- if and (hasKey $svcEnv "STORAGE_S3_ACCESS_KEY") (ne (trim (include "homenavi.storageS3AuthSecretName" $)) "") }}
            - name: STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.storageS3AuthSecretName" $ }}
                  key: {{ include "homenavi.storageS3AccessKeyKey" $ }}
            {{- end }}
            {{- if and (hasKey $svcEnv "STORAGE_S3_SECRET_KEY") (ne (trim (include "homenavi.storageS3AuthSecretName" $)) "") }}
            - name: STORAGE_S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.storageS3AuthSecretName" $ }}
                  key: {{ include "homenavi.storageS3SecretKeyKey" $ }}
            {{- end }}
            {{- if and (hasKey $svcEnv "MINIO_ROOT_USER") (ne (trim (include "homenavi.storageS3AuthSecretName" $)) "") }}
            - name: MINIO_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.storageS3AuthSecretName" $ }}
                  key: {{ include "homenavi.storageS3AccessKeyKey" $ }}
            {{- end }}
            {{- if and (hasKey $svcEnv "MINIO_ROOT_PASSWORD") (ne (trim (include "homenavi.storageS3AuthSecretName" $)) "") }}
            - name: MINIO_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.storageS3AuthSecretName" $ }}
                  key: {{ include "homenavi.storageS3SecretKeyKey" $ }}
            {{- end }}
            {{- range $envKey, $envVal := $svcEnvValueFrom }}
            - name: {{ $envKey }}
              valueFrom:
                {{- toYaml $envVal | nindent 16 }}
            {{- end }}
          {{- end }}
          {{- $mergedEnvFromSecrets := concat (default (list) $.Values.global.envFromSecrets) (default (list) $svc.envFromSecrets) }}
          {{- if $mergedEnvFromSecrets }}
          envFrom:
            {{- range $secret := $mergedEnvFromSecrets }}
            - secretRef:
                name: {{ $secret }}
            {{- end }}
          {{- end }}
          {{- with $svc.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with $svc.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- $containerSecurityContext := mergeOverwrite (deepCopy (default (dict) $.Values.securityContext)) (deepCopy (default (dict) $svc.securityContext)) }}
          {{- if gt (len $containerSecurityContext) 0 }}
          securityContext:
            {{- toYaml $containerSecurityContext | nindent 12 }}
          {{- end }}
      {{- if or $svc.volumes $zigbee2mqttHasConfigSource }}
      volumes:
        {{- with $svc.volumes }}
        {{- range $volume := . }}
        - name: {{ $volume.name }}
          {{- if eq $volume.type "generatedPVC" }}
          {{- $claim := index $.Values.persistentVolumeClaims $volume.claimKey }}
          {{- if and $claim $claim.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "homenavi.fullname" $ }}-{{ $volume.claimKey }}
          {{- else }}
          emptyDir: {}
          {{- end }}
          {{- else if eq $volume.type "pvc" }}
          persistentVolumeClaim:
            claimName: {{ $volume.claimName }}
          {{- else if eq $volume.type "configMap" }}
          configMap:
            name: {{- if $volume.configMapNameTemplate }} {{ include $volume.configMapNameTemplate $ }}{{- else }} {{ $volume.configMapName }}{{- end }}
            {{- with $volume.items }}
            items:
              {{- toYaml . | nindent 14 }}
            {{- end }}
          {{- else if eq $volume.type "secret" }}
          secret:
            secretName: {{- if $volume.secretNameTemplate }} {{ include $volume.secretNameTemplate $ }}{{- else }} {{ $volume.secretName }}{{- end }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- end }}
        {{- end }}
        {{- if $zigbee2mqttHasConfigSource }}
        - name: zigbee2mqtt-bootstrap-config
          configMap:
            name: {{ include "homenavi.zigbee2mqttConfigMapName" (dict "root" $ "service" $svc) }}
            items:
              - key: {{ $zigbee2mqttConfigKey }}
                path: {{ $zigbee2mqttConfigKey }}
        {{- end }}
      {{- end }}
---
{{- end }}
{{- end }}
