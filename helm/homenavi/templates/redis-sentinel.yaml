{{- if and (eq (include "homenavi.redisProvider" .) "bundled") (eq (include "homenavi.redisMode" .) "sentinel") }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "homenavi.redisHeadlessServiceName" . }}
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "homenavi.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
    - name: sentinel
      port: {{ include "homenavi.redisSentinelPort" . }}
      targetPort: {{ include "homenavi.redisSentinelPort" . }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "homenavi.redisSentinelServiceName" . }}
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "homenavi.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
  ports:
    - name: sentinel
      port: {{ include "homenavi.redisSentinelPort" . }}
      targetPort: {{ include "homenavi.redisSentinelPort" . }}
---
{{- if and (default true .Values.redis.sentinel.podDisruptionBudget.enabled) (gt (int (default 3 .Values.redis.sentinel.replicas)) 1) }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "homenavi.redisStatefulSetName" . }}
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "homenavi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  minAvailable: {{ default 2 .Values.redis.sentinel.podDisruptionBudget.minAvailable }}
{{- end }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "homenavi.redisStatefulSetName" . }}
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  serviceName: {{ include "homenavi.redisHeadlessServiceName" . }}
  replicas: {{ default 3 .Values.redis.sentinel.replicas }}
  podManagementPolicy: {{ default "Parallel" .Values.redis.sentinel.podManagementPolicy }}
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "homenavi.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "homenavi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      {{- with .Values.redis.sentinel.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.sentinel.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.redis.sentinel.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    {{- include "homenavi.selectorLabels" . | nindent 20 }}
                    app.kubernetes.io/component: redis
      {{- end }}
      {{- with .Values.redis.sentinel.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- else }}
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              {{- include "homenavi.selectorLabels" . | nindent 14 }}
              app.kubernetes.io/component: redis
      {{- end }}
      terminationGracePeriodSeconds: {{ default 30 .Values.redis.sentinel.terminationGracePeriodSeconds }}
      containers:
        - name: redis
          image: {{ printf "%s:%s" (default "redis" (index (index .Values.services "redis").image "repository")) (default "7.2-alpine" (index (index .Values.services "redis").image "tag")) | quote }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy (index (index .Values.services "redis").image "pullPolicy") }}
          command:
            - /bin/sh
            - -ec
            - |
              ORDINAL="${HOSTNAME##*-}"
              SELF_HOST="${HOSTNAME}.{{ include "homenavi.redisHeadlessServiceName" . }}"
              SELF_FQDN="${SELF_HOST}.{{ .Release.Namespace }}.svc.cluster.local"
              DEFAULT_MASTER="{{ include "homenavi.redisStatefulSetName" . }}-0.{{ include "homenavi.redisHeadlessServiceName" . }}"
              SENTINEL_PORT="{{ include "homenavi.redisSentinelPort" . }}"
              SENTINEL_ADDRS="{{ include "homenavi.redisSentinelAddrs" . }}"
              MASTER_NAME="{{ include "homenavi.redisMasterName" . }}"
              SENTINEL_STATE_DIR="/data/sentinel"
              SENTINEL_STATE_FILE="${SENTINEL_STATE_DIR}/sentinel.conf"
              MASTER_HOST=""
              MASTER_PORT="6379"
              mkdir -p "$SENTINEL_STATE_DIR"
              query_sentinel_master() {
                OLDIFS="$IFS"
                IFS=','
                set -- $SENTINEL_ADDRS
                IFS="$OLDIFS"
                for hostport in "$@"; do
                  host="${hostport%:*}"
                  port="${hostport##*:}"
                  if [ -z "$host" ] || [ -z "$port" ]; then
                    continue
                  fi
                  if redis-cli -h "$host" -p "$port" sentinel get-master-addr-by-name "$MASTER_NAME" >/tmp/master.addr 2>/dev/null; then
                    MASTER_HOST="$(sed -n '1p' /tmp/master.addr | tr -d '\r')"
                    MASTER_PORT="$(sed -n '2p' /tmp/master.addr | tr -d '\r')"
                    if [ -n "$MASTER_HOST" ]; then
                      return 0
                    fi
                  fi
                done
                return 1
              }
              query_persisted_master() {
                if [ ! -s "$SENTINEL_STATE_FILE" ]; then
                  return 1
                fi
                MASTER_HOST="$(awk '$1 == "sentinel" && $2 == "monitor" && $3 == name { print $4; exit }' name="$MASTER_NAME" "$SENTINEL_STATE_FILE")"
                MASTER_PORT="$(awk '$1 == "sentinel" && $2 == "monitor" && $3 == name { print $5; exit }' name="$MASTER_NAME" "$SENTINEL_STATE_FILE")"
                [ -n "$MASTER_HOST" ]
              }
              query_sentinel_master || query_persisted_master || true
              if [ -z "$MASTER_HOST" ]; then
                MASTER_HOST="$DEFAULT_MASTER"
                MASTER_PORT="6379"
              fi
              IS_SELF_MASTER="false"
              case "$MASTER_HOST" in
                "$HOSTNAME"|"$SELF_HOST"|"$SELF_FQDN"|"${POD_IP:-}"|127.0.0.1|localhost)
                  IS_SELF_MASTER="true"
                  ;;
                "$SELF_HOST".*|"$HOSTNAME".*)
                  IS_SELF_MASTER="true"
                  ;;
              esac
              set -- redis-server --appendonly yes --protected-mode no --port 6379 --dir /data
              if [ -n "${REDIS_PASSWORD:-}" ]; then
                set -- "$@" --requirepass "$REDIS_PASSWORD"
                if [ "$IS_SELF_MASTER" != "true" ]; then
                  set -- "$@" --masterauth "$REDIS_PASSWORD"
                fi
              fi
              if [ "$IS_SELF_MASTER" != "true" ]; then
                set -- "$@" --replicaof "$MASTER_HOST" "${MASTER_PORT:-6379}"
              elif [ "$ORDINAL" != "0" ] && [ "$MASTER_HOST" = "$DEFAULT_MASTER" ]; then
                set -- "$@" --replicaof "$DEFAULT_MASTER" 6379
              fi
              exec "$@"
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: REDIS_PASSWORD
              {{- if ne (trim (include "homenavi.redisAuthSecretName" .)) "" }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.redisAuthSecretName" . }}
                  key: {{ include "homenavi.redisAuthPasswordKey" . }}
              {{- else }}
              value: {{ default "" .Values.redis.password | quote }}
              {{- end }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: redis
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: redis
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: redis
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: redis-data
              mountPath: /data
        - name: sentinel
          image: {{ printf "%s:%s" (default "redis" (index (index .Values.services "redis").image "repository")) (default "7.2-alpine" (index (index .Values.services "redis").image "tag")) | quote }}
          imagePullPolicy: {{ default .Values.global.imagePullPolicy (index (index .Values.services "redis").image "pullPolicy") }}
          command:
            - /bin/sh
            - -ec
            - |
              SENTINEL_STATE_DIR="/data/sentinel"
              SENTINEL_STATE_FILE="${SENTINEL_STATE_DIR}/sentinel.conf"
              MASTER="{{ include "homenavi.redisStatefulSetName" . }}-0.{{ include "homenavi.redisHeadlessServiceName" . }}"
              SENTINEL_ADDRS="{{ include "homenavi.redisSentinelAddrs" . }}"
              MASTER_NAME="{{ include "homenavi.redisMasterName" . }}"
              MASTER_PORT="6379"
              mkdir -p "$SENTINEL_STATE_DIR"
              if [ -s "$SENTINEL_STATE_FILE" ]; then
                CURRENT_MASTER="$(awk '$1 == "sentinel" && $2 == "monitor" && $3 == name { print $4; exit }' name="$MASTER_NAME" "$SENTINEL_STATE_FILE")"
                CURRENT_PORT="$(awk '$1 == "sentinel" && $2 == "monitor" && $3 == name { print $5; exit }' name="$MASTER_NAME" "$SENTINEL_STATE_FILE")"
                if [ -n "$CURRENT_MASTER" ]; then
                  MASTER="$CURRENT_MASTER"
                fi
                if [ -n "$CURRENT_PORT" ]; then
                  MASTER_PORT="$CURRENT_PORT"
                fi
              else
                OLDIFS="$IFS"
                IFS=','
                set -- $SENTINEL_ADDRS
                IFS="$OLDIFS"
                for hostport in "$@"; do
                  host="${hostport%:*}"
                  port="${hostport##*:}"
                  if [ -z "$host" ] || [ -z "$port" ]; then
                    continue
                  fi
                  if redis-cli -h "$host" -p "$port" sentinel get-master-addr-by-name "$MASTER_NAME" >/tmp/master.addr 2>/dev/null; then
                    CURRENT_MASTER="$(sed -n '1p' /tmp/master.addr | tr -d '\r')"
                    CURRENT_PORT="$(sed -n '2p' /tmp/master.addr | tr -d '\r')"
                    if [ -n "$CURRENT_MASTER" ]; then
                      MASTER="$CURRENT_MASTER"
                    fi
                    if [ -n "$CURRENT_PORT" ]; then
                      MASTER_PORT="$CURRENT_PORT"
                    fi
                    break
                  fi
                done
              fi
              cat >"$SENTINEL_STATE_FILE" <<EOF
              port {{ include "homenavi.redisSentinelPort" . }}
              dir ${SENTINEL_STATE_DIR}
              sentinel resolve-hostnames yes
              sentinel announce-hostnames yes
              sentinel monitor ${MASTER_NAME} ${MASTER} ${MASTER_PORT} {{ default 2 .Values.redis.sentinel.quorum }}
              sentinel down-after-milliseconds ${MASTER_NAME} {{ default 5000 .Values.redis.sentinel.downAfterMilliseconds }}
              sentinel failover-timeout ${MASTER_NAME} {{ default 60000 .Values.redis.sentinel.failoverTimeoutMilliseconds }}
              sentinel parallel-syncs ${MASTER_NAME} {{ default 1 .Values.redis.sentinel.parallelSyncs }}
              EOF
              if [ -n "${REDIS_PASSWORD:-}" ]; then
                printf 'sentinel auth-pass %s %s\n' "$MASTER_NAME" "$REDIS_PASSWORD" >>"$SENTINEL_STATE_FILE"
              fi
              exec redis-sentinel "$SENTINEL_STATE_FILE"
          env:
            - name: REDIS_PASSWORD
              {{- if ne (trim (include "homenavi.redisAuthSecretName" .)) "" }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "homenavi.redisAuthSecretName" . }}
                  key: {{ include "homenavi.redisAuthPasswordKey" . }}
              {{- else }}
              value: {{ default "" .Values.redis.password | quote }}
              {{- end }}
          ports:
            - name: sentinel
              containerPort: {{ include "homenavi.redisSentinelPort" . }}
              protocol: TCP
          startupProbe:
            tcpSocket:
              port: sentinel
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: sentinel
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: sentinel
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          volumeMounts:
            - name: redis-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: redis-data
        labels:
          {{- include "homenavi.immutableComponentLabels" . | nindent 10 }}
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: {{ default "2Gi" .Values.redis.sentinel.storage.size }}
        {{- with .Values.redis.sentinel.storage.storageClassName }}
        storageClassName: {{ . | quote }}
        {{- end }}
---
{{- end }}
