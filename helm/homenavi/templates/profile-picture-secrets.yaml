{{- $profilePictureEnabled := eq (include "homenavi.serviceEnabled" (dict "root" . "component" "profile-picture-service")) "true" -}}
{{- $minioEnabled := eq (include "homenavi.serviceEnabled" (dict "root" . "component" "minio")) "true" -}}
{{- if and (or $profilePictureEnabled $minioEnabled) (eq (include "homenavi.objectStorageProvider" .) "minio") (eq (trim (default "" .Values.storage.s3.existingSecretName)) "") }}
{{- $storageSecretName := include "homenavi.storageManagedSecretName" . -}}
{{- $storageExisting := lookup "v1" "Secret" .Release.Namespace $storageSecretName -}}
{{- $storageAccessKeyKey := include "homenavi.storageS3AccessKeyKey" . -}}
{{- $storageSecretKeyKey := include "homenavi.storageS3SecretKeyKey" . -}}
{{- $storageAccessKey := "" -}}
{{- if and $storageExisting $storageExisting.data (hasKey $storageExisting.data $storageAccessKeyKey) -}}
{{- $storageAccessKey = (index $storageExisting.data $storageAccessKeyKey | b64dec) -}}
{{- else if ne (trim (default "" .Values.storage.s3.accessKey)) "" -}}
{{- $storageAccessKey = (trim .Values.storage.s3.accessKey) -}}
{{- else -}}
{{- $storageAccessKey = randAlphaNum 20 -}}
{{- end -}}
{{- $storageSecretKey := "" -}}
{{- if and $storageExisting $storageExisting.data (hasKey $storageExisting.data $storageSecretKeyKey) -}}
{{- $storageSecretKey = (index $storageExisting.data $storageSecretKeyKey | b64dec) -}}
{{- else if ne (trim (default "" .Values.storage.s3.secretKey)) "" -}}
{{- $storageSecretKey = (trim .Values.storage.s3.secretKey) -}}
{{- else -}}
{{- $storageSecretKey = randAlphaNum 40 -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $storageSecretName }}
  labels:
    {{- include "homenavi.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ $storageAccessKeyKey }}: {{ $storageAccessKey | quote }}
  {{ $storageSecretKeyKey }}: {{ $storageSecretKey | quote }}
---
{{- end }}