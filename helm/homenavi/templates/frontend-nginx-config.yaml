apiVersion: v1
kind: ConfigMap
metadata:
  name: homenavi-frontend-nginx
  labels:
    {{- include "homenavi.labels" . | nindent 4 }}
data:
  default.conf: |
    map $http_upgrade $connection_upgrade {
      default upgrade;
      '' close;
    }

    server {
      listen 80;
      server_name _;
      root /usr/share/nginx/html;
      index index.html;

      location /api/ {
        proxy_pass http://{{ .Values.frontendProxy.apiGatewayHost }}:{{ .Values.frontendProxy.apiGatewayPort }};
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
      }

      location /integrations/ {
        proxy_pass http://{{ .Values.frontendProxy.integrationProxyHost }}:{{ .Values.frontendProxy.integrationProxyPort }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 15s;
        proxy_send_timeout 600s;
        proxy_read_timeout 3600s;
      }

      location /ws/ {
        proxy_pass http://{{ .Values.frontendProxy.apiGatewayHost }}:{{ .Values.frontendProxy.apiGatewayPort }};
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
      }

      location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
      }

      location /icons/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
      }

      location /manifest.webmanifest {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600";
      }

      location / {
        try_files $uri $uri/ /index.html;
      }
    }
