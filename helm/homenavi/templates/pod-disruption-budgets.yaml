{{- range $name, $svc := .Values.services }}
{{- if and (eq (include "homenavi.serviceEnabled" (dict "root" $ "component" $name)) "true") $svc.podDisruptionBudget $svc.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "homenavi.componentName" (dict "root" $ "component" $name) }}
  labels:
    {{- include "homenavi.componentLabels" (dict "root" $ "component" $name) | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "homenavi.selectorLabels" $ | nindent 6 }}
      app.kubernetes.io/component: {{ $name }}
  {{- with $svc.podDisruptionBudget.minAvailable }}
  minAvailable: {{ . }}
  {{- end }}
  {{- with $svc.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ . }}
  {{- end }}
---
{{- end }}
{{- end }}
