{{- if eq (include "homenavi.jwtBootstrapEnabled" .) "true" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "homenavi.fullname" . }}-jwt-bootstrap
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "jwt-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "homenavi.fullname" . }}-jwt-bootstrap
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "jwt-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "homenavi.fullname" . }}-jwt-bootstrap
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "jwt-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
subjects:
  - kind: ServiceAccount
    name: {{ include "homenavi.fullname" . }}-jwt-bootstrap
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "homenavi.fullname" . }}-jwt-bootstrap
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "homenavi.fullname" . }}-jwt-bootstrap
  labels:
    {{- include "homenavi.componentLabels" (dict "root" . "component" "jwt-bootstrap") | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    metadata:
      labels:
        {{- include "homenavi.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: jwt-bootstrap
    spec:
      serviceAccountName: {{ include "homenavi.fullname" . }}-jwt-bootstrap
      restartPolicy: OnFailure
      containers:
        - name: jwt-bootstrap
          image: {{ .Values.jwt.bootstrap.image.repository }}:{{ .Values.jwt.bootstrap.image.tag }}
          imagePullPolicy: {{ .Values.jwt.bootstrap.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              apk add --no-cache kubectl openssl >/dev/null
              secret_name={{ include "homenavi.jwtSecretName" . | quote }}
              namespace={{ .Release.Namespace | quote }}
              if kubectl -n "$namespace" get secret "$secret_name" >/dev/null 2>&1; then
                echo "JWT secret already exists: $secret_name"
                exit 0
              fi
              tmpdir="$(mktemp -d)"
              trap 'rm -rf "$tmpdir"' EXIT
              openssl genrsa -out "$tmpdir/jwt_private.pem" 2048 >/dev/null 2>&1
              openssl rsa -in "$tmpdir/jwt_private.pem" -pubout -out "$tmpdir/jwt_public.pem" >/dev/null 2>&1
              kubectl -n "$namespace" create secret generic "$secret_name" \
                --from-file=jwt_private.pem="$tmpdir/jwt_private.pem" \
                --from-file=jwt_public.pem="$tmpdir/jwt_public.pem" \
                --dry-run=client -o yaml | kubectl apply -f -
{{- end }}