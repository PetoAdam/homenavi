nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podSecurityContext: {}
securityContext: {}

global:
  imageTag: ""
  imagePullPolicy: IfNotPresent
  logLevel: info
  envFromSecrets: []

storage:
  type: s3
  s3:
    endpoint: ""
    region: us-east-1
    bucket: profile-pictures
    accessKey: ""
    secretKey: ""
    forcePathStyle: true
    presignExpirySeconds: 900
    existingSecretName: ""
    accessKeyKey: accessKey
    secretKeyKey: secretKey

dependencies:
  mqtt:
    provider: emqx
  objectStorage:
    provider: minio
  postgres:
    provider: bundled
  redis:
    provider: bundled

mqtt:
  brokerUrl: ""
  websocketUpstreamUrl: ""
  dependencyHost: ""
  dependencyPort: ""

postgres:
  mode: cnpgManaged
  host: ""
  port: "5432"
  database: users
  username: user
  password: password
  sslMode: disable
  auth:
    existingSecretName: ""
    usernameKey: username
    passwordKey: password
  cnpg:
    clusterName: ""
    imageName: ghcr.io/cloudnative-pg/postgresql:16.6
    instances: 3
    superuserSecretName: ""
    superuserPassword: postgres
    storage:
      size: 10Gi
      storageClassName: ""

redis:
  mode: sentinel
  addr: ""
  password: ""
  masterName: homenavi-redis
  sentinelAddrs: []
  auth:
    existingSecretName: ""
    passwordKey: password
  standalone:
    port: "6379"
  sentinel:
    port: "26379"
    replicas: 3
    quorum: 2
    downAfterMilliseconds: 5000
    failoverTimeoutMilliseconds: 60000
    parallelSyncs: 1
    storage:
      size: 2Gi
      storageClassName: ""

frontendProxy:
  apiGatewayHost: api-gateway
  apiGatewayPort: 8080
  integrationProxyHost: integration-proxy
  integrationProxyPort: 8099

jwt:
  createSecret: true
  existingSecretName: ""
  publicKey: ""
  privateKey: ""
  bootstrap:
    enabled: true
    image:
      repository: alpine
      tag: "3.20"
      pullPolicy: IfNotPresent

integrationProxy:
  marketplaceApiBase: "https://marketplace.homenavi.org"
  rbac:
    createClusterAdminBinding: true
  configYaml: |
    integrations: []
  schemaJson: |
    {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: homenavi.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 3000
        - path: /api
          pathType: Prefix
          service: api-gateway
          port: 8080
  tls: []

persistentVolumeClaims:
  postgres-data:
    enabled: false
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  minio-data:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi
  zigbee2mqtt-data:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi
  integration-proxy-config:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 256Mi

services:
  frontend:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-frontend
      tag: ""
    containerPort: 80
    service:
      enabled: true
      type: ClusterIP
      port: 80
    env: {}
    envFromSecrets: []
    resources: {}
    volumeMounts:
      - name: frontend-nginx-config
        mountPath: /etc/nginx/conf.d/default.conf
        subPath: default.conf
    volumes:
      - name: frontend-nginx-config
        type: configMap
        configMapName: homenavi-frontend-nginx

  api-gateway:
    enabled: true
    replicas: 1
    injectMQTTWebsocketUpstream: true
    image:
      repository: ghcr.io/petoadam/homenavi-api-gateway
      tag: ""
    containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      port: 8080
    env:
      AUTH_SERVICE_URL: http://auth-service:8000
      USER_SERVICE_URL: http://user-service:8001
      REDIS_MODE: standalone
      REDIS_ADDR: redis:6379
      REDIS_MASTER_NAME: ""
      REDIS_SENTINEL_ADDRS: ""
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: auth-service
        port: 8000
      - host: user-service
        port: 8001
      - host: dashboard-service
        port: 8097
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  auth-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-auth-service
      tag: ""
    containerPort: 8000
    service:
      enabled: true
      type: ClusterIP
      port: 8000
    env:
      AUTH_SERVICE_PORT: "8000"
      USER_SERVICE_URL: http://user-service:8001
      ERS_SERVICE_URL: http://entity-registry-service:8005
      REDIS_MODE: standalone
      REDIS_ADDR: redis:6379
      REDIS_MASTER_NAME: ""
      REDIS_SENTINEL_ADDRS: ""
      EMAIL_SERVICE_URL: http://email-service:8002
      PROFILE_PICTURE_SERVICE_URL: http://profile-picture-service:8000
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_private.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: user-service
        port: 8001
      - host: redis
        port: 6379
      - host: email-service
        port: 8002
      - host: profile-picture-service
        port: 8000
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  user-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-user-service
      tag: ""
    containerPort: 8001
    service:
      enabled: true
      type: ClusterIP
      port: 8001
    env:
      USER_SERVICE_PORT: "8001"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_SSLMODE: disable
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  dashboard-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-dashboard-service
      tag: ""
    containerPort: 8097
    service:
      enabled: true
      type: ClusterIP
      port: 8097
    env:
      DASHBOARD_SERVICE_PORT: "8097"
      INTEGRATION_PROXY_URL: http://integration-proxy:8099
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  email-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-email-service
      tag: ""
    containerPort: 8002
    service:
      enabled: true
      type: ClusterIP
      port: 8002
    env:
      EMAIL_SERVICE_PORT: "8002"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      FROM_EMAIL: noreply@homenavi.org
      FROM_NAME: Homenavi
      LOG_LEVEL: info
    envFromSecrets: []
    resources: {}

  profile-picture-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-profile-picture-service
      tag: ""
    containerPort: 8000
    service:
      enabled: true
      type: ClusterIP
      port: 8000
    env:
      PROFILE_PICTURE_SERVICE_PORT: "8000"
      STORAGE_TYPE: s3
      PROFILE_PICTURE_PUBLIC_BASE_PATH: /api/profile-pictures
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_REGION: us-east-1
      STORAGE_S3_BUCKET: profile-pictures
      STORAGE_S3_ACCESS_KEY: ""
      STORAGE_S3_SECRET_KEY: ""
      STORAGE_S3_FORCE_PATH_STYLE: "true"
      STORAGE_PRESIGN_EXPIRY_SECONDS: "900"
    envFromSecrets: []
    resources: {}

  integration-proxy:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-integration-proxy
      tag: ""
    containerPort: 8099
    service:
      enabled: true
      type: ClusterIP
      port: 8099
    env:
      INTEGRATIONS_CONFIG_PATH: /var/lib/integration-proxy/installed.yaml
      INTEGRATIONS_SCHEMA_PATH: /bootstrap-config/homenavi-integration.schema.json
      INTEGRATIONS_RUNTIME_MODE: helm
      INTEGRATIONS_HELM_NAMESPACE: homenavi-integrations
      INTEGRATIONS_MARKETPLACE_API_BASE: "https://marketplace.homenavi.org"
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
    envFromSecrets: []
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
      - name: integration-state
        mountPath: /var/lib/integration-proxy
      - name: integration-config-bootstrap
        mountPath: /bootstrap-config
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName
      - name: integration-state
        type: generatedPVC
        claimKey: integration-proxy-config
      - name: integration-config-bootstrap
        type: configMap
        configMapName: homenavi-integration-proxy-config

  postgres:
    enabled: true
    replicas: 1
    image:
      repository: postgres
      tag: 15-alpine
    containerPort: 5432
    service:
      enabled: true
      type: ClusterIP
      port: 5432
    env:
      POSTGRES_DB: users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    envFromSecrets: []
    startupProbe:
      exec:
        command:
          - /bin/sh
          - -ec
          - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 24
    readinessProbe:
      exec:
        command:
          - /bin/sh
          - -ec
          - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
      periodSeconds: 5
      timeoutSeconds: 5
      failureThreshold: 6
    livenessProbe:
      exec:
        command:
          - /bin/sh
          - -ec
          - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 6
    resources: {}
    volumeMounts:
      - name: postgres-data
        mountPath: /var/lib/postgresql/data
    volumes:
      - name: postgres-data
        type: generatedPVC
        claimKey: postgres-data

  redis:
    enabled: true
    replicas: 1
    image:
      repository: redis
      tag: 7.2-alpine
    containerPort: 6379
    service:
      enabled: true
      type: ClusterIP
      port: 6379
    env: {}
    envFromSecrets: []
    startupProbe:
      tcpSocket:
        port: 6379
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 24
    readinessProbe:
      tcpSocket:
        port: 6379
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 6
    livenessProbe:
      tcpSocket:
        port: 6379
      periodSeconds: 10
      timeoutSeconds: 3
      failureThreshold: 6
    resources: {}

  echo-service:
    enabled: true
    replicas: 1
    image:
      POSTGRES_SSLMODE: disable
      repository: ghcr.io/petoadam/homenavi-echo-service
      tag: ""
    containerPort: 9000
    service:
      enabled: true
      type: ClusterIP
      port: 9000
    env: {}
    envFromSecrets: []
    resources: {}

  emqx:
    enabled: true
    replicas: 1
    image:
      repository: emqx/emqx
      tag: 6.1.1
    containerPort: 1883
    extraContainerPorts:
      - name: websocket
        containerPort: 8083
        protocol: TCP
    service:
      enabled: true
      type: ClusterIP
      port: 1883
      targetPort: 1883
      extraPorts:
        - name: websocket
          port: 8083
          targetPort: 8083
          protocol: TCP
    env:
      EMQX_NODE__NAME: emqx@127.0.0.1
      EMQX_CLUSTER__DISCOVERY_STRATEGY: manual
      EMQX_CLUSTER__STATIC__SEEDS: ""
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: public
      EMQX_LISTENERS__WS__DEFAULT__BIND: 0.0.0.0:8083
    config: |
      ## Place read-only configurations in this file.
      ## To define configurations that can later be overridden through UI/API/CLI, add
      ## them to `etc/base.hocon`.
      ##
      ## Config precedence order:
      ##   etc/base.hocon < cluster.hocon < emqx.conf < environment variables
      ##
      ## See https://www.emqx.io/docs/en/latest/configuration/configuration.html for more information.
      ## Configuration full example can be found in etc/examples

      node {
        name = "emqx@127.0.0.1"
        cookie = "emqxsecretcookie"
        data_dir = "data"
      }

      cluster {
        name = emqxcl
        discovery_strategy = manual
      }

      dashboard {
          listeners {
              http.bind = 18083
              https {
                  ssl_options {
                      certfile = "${EMQX_ETC_DIR}/certs/cert.pem"
                      keyfile = "${EMQX_ETC_DIR}/certs/key.pem"
                  }
              }
          }
      }

      include "homenavi-bridge.hocon"
    bridgeConfigFiles: {}
    envFromSecrets: []
    startupProbe:
      exec:
        command:
          - /bin/sh
          - -ec
          - emqx ping | grep -q '^pong$'
      initialDelaySeconds: 15
      periodSeconds: 5
      timeoutSeconds: 10
      failureThreshold: 36
    readinessProbe:
      tcpSocket:
        port: 1883
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 6
    livenessProbe:
      exec:
        command:
          - /bin/sh
          - -ec
          - emqx ping | grep -q '^pong$'
      initialDelaySeconds: 15
      periodSeconds: 10
      timeoutSeconds: 10
      failureThreshold: 6
    resources: {}
    command:
      - /bin/sh
      - /opt/emqx/etc/bootstrap/docker-entrypoint.sh
    volumeMounts:
      - name: emqx-config
        mountPath: /opt/emqx/etc/emqx.conf
        subPath: emqx.conf
      - name: emqx-config
        mountPath: /opt/emqx/etc/bootstrap/docker-entrypoint.sh
        subPath: docker-entrypoint.sh
      - name: emqx-config
        mountPath: /opt/emqx/etc/homenavi-bridge.d
    volumes:
      - name: emqx-config
        type: configMap
        configMapNameTemplate: homenavi.emqxConfigMapName

  minio:
    enabled: true
    replicas: 1
    image:
      repository: minio/minio
      tag: RELEASE.2025-02-28T09-55-16Z
    containerPort: 9000
    extraContainerPorts:
      - name: console
        containerPort: 9001
        protocol: TCP
    service:
      enabled: true
      type: ClusterIP
      port: 9000
      targetPort: 9000
      extraPorts:
        - name: console
          port: 9001
          targetPort: 9001
          protocol: TCP
    env:
      MINIO_ROOT_USER: ""
      MINIO_ROOT_PASSWORD: ""
    envFromSecrets: []
    resources: {}
    args:
      - server
      - /data
      - --console-address
      - :9001
    volumeMounts:
      - name: minio-data
        mountPath: /data
    volumes:
      - name: minio-data
        type: generatedPVC
        claimKey: minio-data

  device-hub:
    enabled: true
    replicas: 1
    usesMQTT: true
    image:
      repository: ghcr.io/petoadam/homenavi-device-hub
      tag: ""
    containerPort: 8090
    service:
      enabled: true
      type: ClusterIP
      port: 8090
    env:
      DEVICE_HUB_PORT: "8090"
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
      DEVICE_HUB_ENABLE_THREAD: "true"
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}

  entity-registry-service:
    enabled: true
    replicas: 1
    usesMQTT: true
    image:
      repository: ghcr.io/petoadam/homenavi-entity-registry-service
      tag: ""
    containerPort: 8095
    service:
      enabled: true
      type: ClusterIP
      port: 8095
    env:
      ENTITY_REGISTRY_PORT: "8095"
      DEVICE_HUB_URL: http://device-hub:8090
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}

  zigbee-adapter:
    enabled: true
    replicas: 1
    usesMQTT: true
    image:
      repository: ghcr.io/petoadam/homenavi-zigbee-adapter
      tag: ""
    containerPort: 8091
    service:
      enabled: true
      type: ClusterIP
      port: 8091
    env:
      ZIGBEE_ADAPTER_PORT: "8091"
      ZIGBEE_ADAPTER_ID: zigbee-adapter-1
      ZIGBEE_ADAPTER_VERSION: dev
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
      REDIS_MODE: standalone
      REDIS_ADDR: redis:6379
      REDIS_MASTER_NAME: ""
      REDIS_SENTINEL_ADDRS: ""
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
      - host: redis
        port: 6379
    resources: {}

  thread-adapter:
    enabled: true
    replicas: 1
    usesMQTT: true
    image:
      repository: ghcr.io/petoadam/homenavi-thread-adapter
      tag: ""
    containerPort: 8092
    service:
      enabled: true
      type: ClusterIP
      port: 8092
    env:
      THREAD_ADAPTER_PORT: "8092"
      THREAD_ADAPTER_ID: thread-adapter-1
      THREAD_ADAPTER_VERSION: dev
      LOG_LEVEL: info
    envFromSecrets: []
    resources: {}

  history-service:
    enabled: true
    replicas: 1
    usesMQTT: true
    image:
      repository: ghcr.io/petoadam/homenavi-history-service
      tag: ""
    containerPort: 8093
    service:
      enabled: true
      type: ClusterIP
      port: 8093
    env:
      HISTORY_SERVICE_PORT: "8093"
      HISTORY_INGEST_RETAINED: "false"
      HISTORY_HDP_STATE_PREFIX: homenavi/hdp/device/state/
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}

  automation-service:
    enabled: true
    replicas: 1
    usesMQTT: true
    image:
      repository: ghcr.io/petoadam/homenavi-automation-service
      tag: ""
    containerPort: 8094
    service:
      enabled: true
      type: ClusterIP
      port: 8094
    env:
      AUTOMATION_SERVICE_PORT: "8094"
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      USER_SERVICE_URL: http://user-service:8001
      EMAIL_SERVICE_URL: http://email-service:8002
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  weather-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-weather-service
      tag: ""
    containerPort: 8095
    service:
      enabled: true
      type: ClusterIP
      port: 8095
    env:
      PORT: "8095"
      OPENWEATHER_API_KEY: ""
      CACHE_TTL_MINUTES: "15"
      LOG_LEVEL: info
    envFromSecrets: []
    resources: {}

  jaeger:
    enabled: true
    replicas: 1
    image:
      repository: jaegertracing/all-in-one
      tag: 1.76.0
    containerPort: 16686
    service:
      enabled: true
      type: ClusterIP
      port: 16686
      targetPort: 16686
    env: {}
    envFromSecrets: []
    resources: {}

  prometheus:
    enabled: false
    replicas: 1
    image:
      repository: prom/prometheus
      tag: v3.9.1
    containerPort: 9090
    service:
      enabled: true
      type: ClusterIP
      port: 9090
    env: {}
    envFromSecrets: []
    resources: {}

  grafana:
    enabled: false
    replicas: 1
    image:
      repository: grafana/grafana
      tag: 12.3.2
    containerPort: 3000
    service:
      enabled: true
      type: ClusterIP
      port: 3000
    env: {}
    envFromSecrets: []
    dependsOn:
      - host: prometheus
        port: 9090
    resources: {}

  zigbee2mqtt:
    enabled: false
    replicas: 1
    image:
      repository: koenkk/zigbee2mqtt
      tag: 2.8.0
    containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      port: 8080
    env:
      TZ: UTC
    # Optional bootstrap source for /app/data/configuration.yaml.
    # If set, the chart seeds the persistent data directory once so Zigbee2MQTT
    # starts with the same on-disk layout as the Docker Compose deployment.
    configuration: ""
    existingConfigurationConfigMap: ""
    configurationConfigMapKey: configuration.yaml
    bootstrapConfiguration: true
    # When true, the chart overwrites /app/data/configuration.yaml on every pod
    # start from the configured source. Keep false if you want Zigbee2MQTT/API/UI
    # driven config changes to persist in the PVC between restarts.
    overwriteConfigurationOnDeploy: false
    envFromSecrets: []
    dependsOn:
      - host: emqx
        port: 1883
    resources: {}
    volumeMounts:
      - name: zigbee2mqtt-data
        mountPath: /app/data
      - name: zigbee2mqtt-tmp
        mountPath: /tmp
    volumes:
      - name: zigbee2mqtt-data
        type: generatedPVC
        claimKey: zigbee2mqtt-data
      - name: zigbee2mqtt-tmp
    securityContext:
      readOnlyRootFilesystem: false
