nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podSecurityContext: {}
securityContext: {}

global:
  imageTag: latest
  imagePullPolicy: IfNotPresent
  logLevel: info
  envFromSecrets: []

frontendProxy:
  apiGatewayHost: api-gateway
  apiGatewayPort: 8080
  integrationProxyHost: integration-proxy
  integrationProxyPort: 8099

jwt:
  createSecret: true
  existingSecretName: ""
  publicKey: ""
  privateKey: ""
  bootstrap:
    enabled: true
    image:
      repository: alpine
      tag: "3.20"
      pullPolicy: IfNotPresent

integrationProxy:
  marketplaceApiBase: "https://marketplace.homenavi.org"
  rbac:
    createClusterAdminBinding: true
  configYaml: |
    integrations: []
  schemaJson: |
    {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: homenavi.local
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 3000
        - path: /api
          pathType: Prefix
          service: api-gateway
          port: 8080
  tls: []

persistentVolumeClaims:
  postgres-data:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 10Gi
  profile-pictures:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  mosquitto-data:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi
  mosquitto-logs:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  zigbee2mqtt-data:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 2Gi
  integration-proxy-config:
    enabled: true
    storageClassName: ""
    accessModes:
      - ReadWriteOnce
    size: 256Mi

services:
  frontend:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-frontend
      tag: ""
    containerPort: 80
    service:
      enabled: true
      type: ClusterIP
      port: 80
    env: {}
    envFromSecrets: []
    resources: {}
    volumeMounts:
      - name: frontend-nginx-config
        mountPath: /etc/nginx/conf.d/default.conf
        subPath: default.conf
    volumes:
      - name: frontend-nginx-config
        type: configMap
        configMapName: homenavi-frontend-nginx

  api-gateway:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-api-gateway
      tag: ""
    containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      port: 8080
    env:
      AUTH_SERVICE_URL: http://auth-service:8000
      USER_SERVICE_URL: http://user-service:8001
      REDIS_ADDR: redis:6379
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: auth-service
        port: 8000
      - host: user-service
        port: 8001
      - host: dashboard-service
        port: 8097
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  auth-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-auth-service
      tag: ""
    containerPort: 8000
    service:
      enabled: true
      type: ClusterIP
      port: 8000
    env:
      AUTH_SERVICE_PORT: "8000"
      USER_SERVICE_URL: http://user-service:8001
      ERS_SERVICE_URL: http://entity-registry-service:8005
      REDIS_ADDR: redis:6379
      EMAIL_SERVICE_URL: http://email-service:8002
      PROFILE_PICTURE_SERVICE_URL: http://profile-picture-service:8000
      JWT_PRIVATE_KEY_PATH: /app/keys/jwt_private.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: user-service
        port: 8001
      - host: redis
        port: 6379
      - host: email-service
        port: 8002
      - host: profile-picture-service
        port: 8000
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  user-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-user-service
      tag: ""
    containerPort: 8001
    service:
      enabled: true
      type: ClusterIP
      port: 8001
    env:
      USER_SERVICE_PORT: "8001"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  dashboard-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-dashboard-service
      tag: ""
    containerPort: 8097
    service:
      enabled: true
      type: ClusterIP
      port: 8097
    env:
      DASHBOARD_SERVICE_PORT: "8097"
      INTEGRATION_PROXY_URL: http://integration-proxy:8099
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  email-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-email-service
      tag: ""
    containerPort: 8002
    service:
      enabled: true
      type: ClusterIP
      port: 8002
    env:
      EMAIL_SERVICE_PORT: "8002"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      FROM_EMAIL: noreply@homenavi.org
      FROM_NAME: Homenavi
      LOG_LEVEL: info
    envFromSecrets: []
    resources: {}

  profile-picture-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-profile-picture-service
      tag: ""
    containerPort: 8000
    service:
      enabled: true
      type: ClusterIP
      port: 8000
    env:
      PROFILE_PICTURE_SERVICE_PORT: "8000"
    envFromSecrets: []
    resources: {}
    volumeMounts:
      - name: profile-pictures
        mountPath: /uploads
    volumes:
      - name: profile-pictures
        type: generatedPVC
        claimKey: profile-pictures

  integration-proxy:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-integration-proxy
      tag: ""
    containerPort: 8099
    service:
      enabled: true
      type: ClusterIP
      port: 8099
    env:
      INTEGRATIONS_CONFIG_PATH: /var/lib/integration-proxy/installed.yaml
      INTEGRATIONS_SCHEMA_PATH: /bootstrap-config/homenavi-integration.schema.json
      INTEGRATIONS_RUNTIME_MODE: helm
      INTEGRATIONS_HELM_NAMESPACE: homenavi-integrations
      INTEGRATIONS_MARKETPLACE_API_BASE: "https://marketplace.homenavi.org"
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
    envFromSecrets: []
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
      - name: integration-state
        mountPath: /var/lib/integration-proxy
      - name: integration-config-bootstrap
        mountPath: /bootstrap-config
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName
      - name: integration-state
        type: generatedPVC
        claimKey: integration-proxy-config
      - name: integration-config-bootstrap
        type: configMap
        configMapName: homenavi-integration-proxy-config

  postgres:
    enabled: true
    replicas: 1
    image:
      repository: postgres
      tag: 15-alpine
    containerPort: 5432
    service:
      enabled: true
      type: ClusterIP
      port: 5432
    env:
      POSTGRES_DB: users
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    envFromSecrets: []
    resources: {}
    volumeMounts:
      - name: postgres-data
        mountPath: /var/lib/postgresql/data
    volumes:
      - name: postgres-data
        type: generatedPVC
        claimKey: postgres-data

  redis:
    enabled: true
    replicas: 1
    image:
      repository: redis
      tag: 7-alpine
    containerPort: 6379
    service:
      enabled: true
      type: ClusterIP
      port: 6379
    env: {}
    envFromSecrets: []
    resources: {}

  echo-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-echo-service
      tag: ""
    containerPort: 9000
    service:
      enabled: true
      type: ClusterIP
      port: 9000
    env: {}
    envFromSecrets: []
    resources: {}

  mosquitto:
    enabled: true
    replicas: 1
    image:
      repository: eclipse-mosquitto
      tag: "2"
    containerPort: 1883
    extraContainerPorts:
      - name: websocket
        containerPort: 9001
        protocol: TCP
    service:
      enabled: true
      type: ClusterIP
      port: 1883
      targetPort: 1883
      extraPorts:
        - name: websocket
          port: 9001
          targetPort: 9001
          protocol: TCP
    env: {}
    envFromSecrets: []
    resources: {}
    config: |
      persistence true
      persistence_location /mosquitto/data/
      log_dest file /mosquitto/log/mosquitto.log

      listener 1883 0.0.0.0
      allow_anonymous true

      listener 9001 0.0.0.0
      protocol websockets
    bridge:
      enabled: false
      config: ""
    volumeMounts:
      - name: mosquitto-data
        mountPath: /mosquitto/data
      - name: mosquitto-logs
        mountPath: /mosquitto/log
      - name: mosquitto-config
        mountPath: /mosquitto/config/mosquitto.conf
        subPath: mosquitto.conf
    volumes:
      - name: mosquitto-data
        type: generatedPVC
        claimKey: mosquitto-data
      - name: mosquitto-logs
        type: generatedPVC
        claimKey: mosquitto-logs
      - name: mosquitto-config
        type: configMap
        configMapName: homenavi-mosquitto-config

  device-hub:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-device-hub
      tag: ""
    containerPort: 8090
    service:
      enabled: true
      type: ClusterIP
      port: 8090
    env:
      DEVICE_HUB_PORT: "8090"
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DEVICE_HUB_ENABLE_THREAD: "true"
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: mosquitto
        port: 1883
      - host: postgres
        port: 5432
    resources: {}

  entity-registry-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-entity-registry-service
      tag: ""
    containerPort: 8095
    service:
      enabled: true
      type: ClusterIP
      port: 8095
    env:
      ENTITY_REGISTRY_PORT: "8095"
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      DEVICE_HUB_URL: http://device-hub:8090
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    envFromSecrets: []
    dependsOn:
      - host: postgres
        port: 5432
      - host: mosquitto
        port: 1883
    resources: {}

  zigbee-adapter:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-zigbee-adapter
      tag: ""
    containerPort: 8091
    service:
      enabled: true
      type: ClusterIP
      port: 8091
    env:
      ZIGBEE_ADAPTER_PORT: "8091"
      ZIGBEE_ADAPTER_ID: zigbee-adapter-1
      ZIGBEE_ADAPTER_VERSION: dev
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      REDIS_ADDR: redis:6379
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: mosquitto
        port: 1883
      - host: postgres
        port: 5432
      - host: redis
        port: 6379
    resources: {}

  thread-adapter:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-thread-adapter
      tag: ""
    containerPort: 8092
    service:
      enabled: true
      type: ClusterIP
      port: 8092
    env:
      THREAD_ADAPTER_PORT: "8092"
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      THREAD_ADAPTER_ID: thread-adapter-1
      THREAD_ADAPTER_VERSION: dev
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: mosquitto
        port: 1883
    resources: {}

  history-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-history-service
      tag: ""
    containerPort: 8093
    service:
      enabled: true
      type: ClusterIP
      port: 8093
    env:
      HISTORY_SERVICE_PORT: "8093"
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      HISTORY_SERVICE_MQTT_CLIENT_ID: history-service
      HISTORY_INGEST_RETAINED: "false"
      HISTORY_HDP_STATE_PREFIX: homenavi/hdp/device/state/
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: mosquitto
        port: 1883
      - host: postgres
        port: 5432
    resources: {}

  automation-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-automation-service
      tag: ""
    containerPort: 8094
    service:
      enabled: true
      type: ClusterIP
      port: 8094
    env:
      AUTOMATION_SERVICE_PORT: "8094"
      MQTT_BROKER_URL: mqtt://mosquitto:1883
      AUTOMATION_SERVICE_MQTT_CLIENT_ID: automation-service
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: users
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_SSLMODE: disable
      JWT_PUBLIC_KEY_PATH: /app/keys/jwt_public.pem
      USER_SERVICE_URL: http://user-service:8001
      EMAIL_SERVICE_URL: http://email-service:8002
      LOG_LEVEL: info
    envFromSecrets: []
    dependsOn:
      - host: mosquitto
        port: 1883
      - host: postgres
        port: 5432
    resources: {}
    volumeMounts:
      - name: jwt-keys
        mountPath: /app/keys
    volumes:
      - name: jwt-keys
        type: secret
        secretNameTemplate: homenavi.jwtSecretName

  weather-service:
    enabled: true
    replicas: 1
    image:
      repository: ghcr.io/petoadam/homenavi-weather-service
      tag: ""
    containerPort: 8095
    service:
      enabled: true
      type: ClusterIP
      port: 8095
    env:
      PORT: "8095"
      OPENWEATHER_API_KEY: ""
      CACHE_TTL_MINUTES: "15"
      LOG_LEVEL: info
    envFromSecrets: []
    resources: {}

  jaeger:
    enabled: true
    replicas: 1
    image:
      repository: jaegertracing/all-in-one
      tag: latest
    containerPort: 16686
    service:
      enabled: true
      type: ClusterIP
      port: 16686
      targetPort: 16686
    env: {}
    envFromSecrets: []
    resources: {}

  prometheus:
    enabled: false
    replicas: 1
    image:
      repository: prom/prometheus
      tag: latest
    containerPort: 9090
    service:
      enabled: true
      type: ClusterIP
      port: 9090
    env: {}
    envFromSecrets: []
    resources: {}

  grafana:
    enabled: false
    replicas: 1
    image:
      repository: grafana/grafana
      tag: latest
    containerPort: 3000
    service:
      enabled: true
      type: ClusterIP
      port: 3000
    env: {}
    envFromSecrets: []
    dependsOn:
      - host: prometheus
        port: 9090
    resources: {}

  zigbee2mqtt:
    enabled: false
    replicas: 1
    image:
      repository: koenkk/zigbee2mqtt
      tag: latest
    containerPort: 8080
    service:
      enabled: true
      type: ClusterIP
      port: 8080
    env:
      TZ: UTC
    envFromSecrets: []
    dependsOn:
      - host: mosquitto
        port: 1883
    resources: {}
    volumeMounts:
      - name: zigbee2mqtt-data
        mountPath: /app/data
    volumes:
      - name: zigbee2mqtt-data
        type: generatedPVC
        claimKey: zigbee2mqtt-data
