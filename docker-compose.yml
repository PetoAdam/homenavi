services:
  jwt-bootstrap:
    image: alpine:3.20
    command:
      - /bin/sh
      - -ec
      - |
        apk add --no-cache bash openssl >/dev/null
        /bin/bash /app/ensure-jwt-keys.sh --dir /keys
    volumes:
      - ./scripts/ensure-jwt-keys.sh:/app/ensure-jwt-keys.sh:ro
      - ./keys:/keys
    restart: "no"

  # NOTE: Only frontend, api-gateway and nginx expose host ports in this hardened config.
  # For local debugging you can temporarily uncomment the 'ports' blocks (marked DEV) below.
  # DO NOT commit uncommented internal service ports to main.
  frontend:
    image: ghcr.io/petoadam/homenavi-frontend:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_HOST_PORT}:${FRONTEND_CONTAINER_PORT}"
    restart: unless-stopped
    networks:
      - homenavi-network
  api-gateway:
    image: ghcr.io/petoadam/homenavi-api-gateway:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./api-gateway/Dockerfile
    ports:
      - "${API_GATEWAY_HOST_PORT}:${API_GATEWAY_PORT}"
    restart: unless-stopped
    environment:
      - AUTH_SERVICE_URL=http://auth-service:${AUTH_SERVICE_PORT}
      - USER_SERVICE_URL=http://user-service:${USER_SERVICE_PORT}
      - MQTT_WEBSOCKET_UPSTREAM_URL=${MQTT_WEBSOCKET_UPSTREAM_URL:-ws://emqx:8083/mqtt}
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
      - REDIS_MODE=standalone
      - REDIS_ADDR=redis:${REDIS_PORT}
      - REDIS_MASTER_NAME=${REDIS_MASTER_NAME:-}
      - REDIS_SENTINEL_ADDRS=${REDIS_SENTINEL_ADDRS:-}
      - JAEGER_ENDPOINT=http://jaeger:${JAEGER_COLLECTOR_PORT}/api/traces
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      jwt-bootstrap:
        condition: service_completed_successfully
      auth-service:
        condition: service_started
      user-service:
        condition: service_started
      dashboard-service:
        condition: service_started
      redis:
        condition: service_healthy
      emqx:
        condition: service_healthy
    networks:
      - homenavi-network

  auth-service:
    image: ghcr.io/petoadam/homenavi-auth-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./auth-service/Dockerfile
    restart: unless-stopped
  # DEV: expose directly (e.g. curl localhost:8000)
  # ports:
  #   - "8000:8000"
    environment:
      - AUTH_SERVICE_PORT=${AUTH_SERVICE_PORT}
      - USER_SERVICE_URL=http://user-service:${USER_SERVICE_PORT}
      - ERS_SERVICE_URL=http://entity-registry-service:${ENTITY_REGISTRY_PORT}
      - JWT_PRIVATE_KEY_PATH=/app/keys/jwt_private.pem
      - REDIS_MODE=standalone
      - REDIS_ADDR=redis:${REDIS_PORT}
      - REDIS_MASTER_NAME=${REDIS_MASTER_NAME:-}
      - REDIS_SENTINEL_ADDRS=${REDIS_SENTINEL_ADDRS:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - EMAIL_SERVICE_URL=http://email-service:${EMAIL_SERVICE_PORT}
      - PROFILE_PICTURE_SERVICE_URL=http://profile-picture-service:${PROFILE_PICTURE_SERVICE_PORT}
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - GOOGLE_OAUTH_REDIRECT_URL=${GOOGLE_OAUTH_REDIRECT_URL}
      - JAEGER_ENDPOINT=http://jaeger:${JAEGER_COLLECTOR_PORT}/api/traces
    volumes:
      - ./keys:/app/keys:ro
    depends_on:
      jwt-bootstrap:
        condition: service_completed_successfully
      user-service:
        condition: service_started
      redis:
        condition: service_healthy
      email-service:
        condition: service_started
      profile-picture-service:
        condition: service_started
    networks:
      - homenavi-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
  # DEV:
  # ports:
  #   - "6379:6379"
    networks:
      - homenavi-network

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - homenavi-network
    ports:
      - "${PROMETHEUS_HOST_PORT}:${PROMETHEUS_PORT}"

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    networks:
      - homenavi-network
    depends_on:
      - prometheus
    ports:
      - "${GRAFANA_HOST_PORT}:${GRAFANA_PORT}"

  jaeger:
    image: jaegertracing/all-in-one
    restart: unless-stopped
    networks:
      - homenavi-network
    ports:
      - "${JAEGER_UI_HOST_PORT}:${JAEGER_UI_PORT}"
      - "${JAEGER_COLLECTOR_HOST_PORT}:${JAEGER_COLLECTOR_PORT}"

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "${NGINX_HOST_PORT}:${NGINX_PORT}"
    volumes:
      - ./nginx/nginx.conf.dev.template:/etc/nginx/nginx.conf.dev.template:ro
      - ./nginx/nginx.conf.prod.template:/etc/nginx/nginx.conf.prod.template:ro
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      - ${NGINX_CERT_ORIGIN}:/etc/nginx/certs/nginx.crt:ro
      - ${NGINX_KEY_ORIGIN}:/etc/nginx/certs/nginx.key:ro
    environment:
      - NGINX_MODE=${NGINX_MODE}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    depends_on:
      - api-gateway
      - frontend
    restart: unless-stopped
    networks:
      - homenavi-network

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - homenavi-network
  # DEV:
  # ports:
  #   - "5432:5432"

  user-service:
    image: ghcr.io/petoadam/homenavi-user-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./user-service/Dockerfile
    restart: unless-stopped
  # DEV:
  # ports:
  #   - "8001:8001"
    environment:
      - USER_SERVICE_PORT=${USER_SERVICE_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
      - JAEGER_ENDPOINT=http://jaeger:${JAEGER_COLLECTOR_PORT}/api/traces
    depends_on:
      jwt-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - homenavi-network
    volumes:
      - ./keys:/app/keys:ro

  dashboard-service:
    image: ghcr.io/petoadam/homenavi-dashboard-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./dashboard-service/Dockerfile
    restart: unless-stopped
    environment:
      - DASHBOARD_SERVICE_PORT=${DASHBOARD_SERVICE_PORT:-8097}
      - INTEGRATION_PROXY_URL=http://integration-proxy:8099
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
    depends_on:
      jwt-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    networks:
      - homenavi-network
    volumes:
      - ./keys:/app/keys:ro

  profile-picture-service:
    image: ghcr.io/petoadam/homenavi-profile-picture-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build: ./profile-picture-service
    restart: unless-stopped
    depends_on:
      minio-create-bucket:
        condition: service_completed_successfully
    environment:
      - PROFILE_PICTURE_SERVICE_PORT=${PROFILE_PICTURE_SERVICE_PORT}
      - STORAGE_TYPE=${PROFILE_PICTURE_STORAGE_TYPE:-s3}
      - PROFILE_PICTURE_PUBLIC_BASE_PATH=/api/profile-pictures
      - STORAGE_S3_ENDPOINT=${PROFILE_PICTURE_STORAGE_S3_ENDPOINT:-http://minio:9000}
      - STORAGE_S3_REGION=${PROFILE_PICTURE_STORAGE_S3_REGION:-us-east-1}
      - STORAGE_S3_BUCKET=${PROFILE_PICTURE_STORAGE_S3_BUCKET:-profile-pictures}
      - STORAGE_S3_ACCESS_KEY=${PROFILE_PICTURE_STORAGE_S3_ACCESS_KEY:?set PROFILE_PICTURE_STORAGE_S3_ACCESS_KEY in .env}
      - STORAGE_S3_SECRET_KEY=${PROFILE_PICTURE_STORAGE_S3_SECRET_KEY:?set PROFILE_PICTURE_STORAGE_S3_SECRET_KEY in .env}
      - STORAGE_S3_FORCE_PATH_STYLE=${PROFILE_PICTURE_STORAGE_S3_FORCE_PATH_STYLE:-true}
      - STORAGE_PRESIGN_EXPIRY_SECONDS=${PROFILE_PICTURE_STORAGE_PRESIGN_EXPIRY_SECONDS:-900}
    networks:
      - homenavi-network
  # DEV:
  # ports:
  #   - "8086:8000"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=${PROFILE_PICTURE_STORAGE_S3_ACCESS_KEY:?set PROFILE_PICTURE_STORAGE_S3_ACCESS_KEY in .env}
      - MINIO_ROOT_PASSWORD=${PROFILE_PICTURE_STORAGE_S3_SECRET_KEY:?set PROFILE_PICTURE_STORAGE_S3_SECRET_KEY in .env}
    volumes:
      - minio_data:/data
    networks:
      - homenavi-network

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-02-21T16-00-46Z
    restart: "no"
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://minio:9000 "${PROFILE_PICTURE_STORAGE_S3_ACCESS_KEY:?set PROFILE_PICTURE_STORAGE_S3_ACCESS_KEY in .env}" "${PROFILE_PICTURE_STORAGE_S3_SECRET_KEY:?set PROFILE_PICTURE_STORAGE_S3_SECRET_KEY in .env}"; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb --ignore-existing local/${PROFILE_PICTURE_STORAGE_S3_BUCKET:-profile-pictures}
    networks:
      - homenavi-network

  email-service:
    image: ghcr.io/petoadam/homenavi-email-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./email-service/Dockerfile
    restart: unless-stopped
    environment:
      - EMAIL_SERVICE_PORT=${EMAIL_SERVICE_PORT}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - FROM_EMAIL=${FROM_EMAIL:-noreply@homenavi.org}
      - FROM_NAME=${FROM_NAME:-Homenavi}
      - JAEGER_ENDPOINT=http://jaeger:${JAEGER_COLLECTOR_PORT}/api/traces
    networks:
      - homenavi-network
  # DEV:
  # ports:
  #   - "8002:8002"

  echo-service:
    image: ghcr.io/petoadam/homenavi-echo-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build: ./echo-service
    restart: unless-stopped
    networks:
      - homenavi-network
  # DEV:
  # ports:
  #   - "9000:9000"

  emqx:
    image: emqx/emqx:6.1.1
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "emqx ping | grep -q '^pong$'"]
      interval: 5s
      timeout: 10s
      retries: 36
      start_period: 30s
    networks:
      - homenavi-network
    volumes:
      - ./emqx/emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ./emqx/bridge.d:/opt/emqx/etc/homenavi-bridge.d:ro
      - ./emqx/docker-entrypoint.sh:/opt/emqx/etc/docker-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/opt/emqx/etc/docker-entrypoint.sh"]
    environment:
      - EMQX_NODE__NAME=emqx@127.0.0.1
      - EMQX_CLUSTER__DISCOVERY_STRATEGY=manual
      - EMQX_CLUSTER__STATIC__SEEDS=
      - EMQX_DASHBOARD__DEFAULT_USERNAME=${EMQX_DASHBOARD_USERNAME:-admin}
      - EMQX_DASHBOARD__DEFAULT_PASSWORD=${EMQX_DASHBOARD_PASSWORD:-public}
      - EMQX_LISTENERS__WS__DEFAULT__BIND=0.0.0.0:8083
    ports:
      - "${MQTT_HOST_PORT}:${MQTT_PORT}"
      - "${MQTT_WS_HOST_PORT}:8083"

  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    profiles:
      - zigbee-hardware
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_healthy
    networks:
      - homenavi-network
    environment:
      - TZ=UTC
    volumes:
      - ./zigbee2mqtt-data:/app/data
    # To use your USB dongle, uncomment and adjust the device mapping below on the deployment host ONLY (not committed with a host-specific path)
    # devices:
    #   - /dev/ttyUSB0:/dev/ttyACM0
    # NOTE: Web UI disabled for minimal attack surface; can enable via configuration.yaml if needed

  device-hub:
    image: ghcr.io/petoadam/homenavi-device-hub:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./device-hub/Dockerfile
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - DEVICE_HUB_PORT=${DEVICE_HUB_PORT}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://emqx:1883}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
      - DEVICE_HUB_ENABLE_THREAD=true
      - LOG_LEVEL=${LOG_LEVEL}
      - JAEGER_ENDPOINT=http://jaeger:${JAEGER_COLLECTOR_PORT}/api/traces
    networks:
      - homenavi-network
    # No ports exposed; internal only

  entity-registry-service:
    image: ghcr.io/petoadam/homenavi-entity-registry-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./entity-registry-service/Dockerfile
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - ENTITY_REGISTRY_PORT=${ENTITY_REGISTRY_PORT}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://emqx:1883}
      - DEVICE_HUB_URL=http://device-hub:${DEVICE_HUB_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
    networks:
      - homenavi-network
    # No ports exposed; internal only

  zigbee-adapter:
    image: ghcr.io/petoadam/homenavi-zigbee-adapter:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./zigbee-adapter/Dockerfile
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - ZIGBEE_ADAPTER_PORT=${ZIGBEE_ADAPTER_PORT}
      - ZIGBEE_ADAPTER_ID=zigbee-adapter-1
      - ZIGBEE_ADAPTER_VERSION=dev
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://emqx:1883}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
      - REDIS_MODE=standalone
      - REDIS_ADDR=redis:${REDIS_PORT}
      - REDIS_MASTER_NAME=${REDIS_MASTER_NAME:-}
      - REDIS_SENTINEL_ADDRS=${REDIS_SENTINEL_ADDRS:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - LOG_LEVEL=${LOG_LEVEL}
      - JAEGER_ENDPOINT=http://jaeger:${JAEGER_COLLECTOR_PORT}/api/traces
    networks:
      - homenavi-network

  thread-adapter:
    image: ghcr.io/petoadam/homenavi-thread-adapter:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./thread-adapter/Dockerfile
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_healthy
    environment:
      - THREAD_ADAPTER_PORT=${THREAD_ADAPTER_PORT}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://emqx:1883}
      - THREAD_ADAPTER_ID=thread-adapter-1
      - THREAD_ADAPTER_VERSION=dev
      - LOG_LEVEL=${LOG_LEVEL}
      - JAEGER_ENDPOINT=http://jaeger:${JAEGER_COLLECTOR_PORT}/api/traces
    networks:
      - homenavi-network

  history-service:
    image: ghcr.io/petoadam/homenavi-history-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./history-service/Dockerfile
    restart: unless-stopped
    depends_on:
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - HISTORY_SERVICE_PORT=${HISTORY_SERVICE_PORT}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://emqx:1883}
      - HISTORY_SERVICE_MQTT_CLIENT_ID=${HISTORY_SERVICE_MQTT_CLIENT_ID:-}
      - HISTORY_INGEST_RETAINED=${HISTORY_INGEST_RETAINED}
      - HISTORY_HDP_STATE_PREFIX=${HISTORY_HDP_STATE_PREFIX}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - homenavi-network

  automation-service:
    image: ghcr.io/petoadam/homenavi-automation-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./automation-service/Dockerfile
    restart: unless-stopped
    depends_on:
      jwt-bootstrap:
        condition: service_completed_successfully
      emqx:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - AUTOMATION_SERVICE_PORT=${AUTOMATION_SERVICE_PORT}
      - MQTT_BROKER_URL=${MQTT_BROKER_URL:-mqtt://emqx:1883}
      - AUTOMATION_SERVICE_MQTT_CLIENT_ID=${AUTOMATION_SERVICE_MQTT_CLIENT_ID:-}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE}
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
      - USER_SERVICE_URL=http://user-service:${USER_SERVICE_PORT}
      - EMAIL_SERVICE_URL=http://email-service:${EMAIL_SERVICE_PORT}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ./keys:/app/keys:ro
    networks:
      - homenavi-network

  weather-service:
    image: ghcr.io/petoadam/homenavi-weather-service:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./weather-service/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=${WEATHER_SERVICE_PORT:-8095}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - CACHE_TTL_MINUTES=${WEATHER_CACHE_TTL_MINUTES:-15}
      - LOG_LEVEL=${LOG_LEVEL}
    networks:
      - homenavi-network

  integration-proxy:
    image: ghcr.io/petoadam/homenavi-integration-proxy:${HN_VERSION:-latest}
    pull_policy: if_not_present
    build:
      context: .
      dockerfile: ./integration-proxy/Dockerfile
    restart: unless-stopped
    environment:
      - INTEGRATIONS_CONFIG_PATH=/config/installed.yaml
      - INTEGRATIONS_SCHEMA_PATH=/config/homenavi-integration.schema.json
      - INTEGRATIONS_COMPOSE_ENABLED=true
      - INTEGRATIONS_COMPOSE_FILE=/app/integrations/docker-compose.integrations.yml
      - INTEGRATIONS_COMPOSE_PROJECT=homenavi
      - INTEGRATIONS_COMPOSE_ENV_FILE=/app/.env
      - INTEGRATIONS_ROOT=${INTEGRATIONS_ROOT:-${PWD}}
      - JWT_PUBLIC_KEY_PATH=/app/keys/jwt_public.pem
    volumes:
      - ${INTEGRATIONS_ROOT:-${PWD}}:${INTEGRATIONS_ROOT:-${PWD}}:ro
      - ${INTEGRATIONS_ROOT:-${PWD}}/integrations/secrets:${INTEGRATIONS_ROOT:-${PWD}}/integrations/secrets:rw
      - ${INTEGRATIONS_CONFIG_FILE:-./integrations/config/installed.yaml}:/config/installed.yaml:rw
      - ./integrations/config/marketplace.yaml:/config/marketplace.yaml:ro
      - ./integrations/spec/homenavi-integration.schema.json:/config/homenavi-integration.schema.json:ro
      - ./integrations/docker-compose.integrations.yml:/app/integrations/docker-compose.integrations.yml:ro
      - ./.env:/app/.env:ro
      - ./keys:/app/keys:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      jwt-bootstrap:
        condition: service_completed_successfully
    networks:
      - homenavi-network


volumes:
  postgres_data:
  auth_postgres_data:
  minio_data:

networks:
  homenavi-network:
    name: homenavi-network
    driver: bridge
    